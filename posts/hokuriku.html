          <h1>日本北陸十日遊</h1>
          <p>北陸十日遊是目前比較有路線感的一趟。移動很多，也看了很多不一樣的風景，從雪牆到老街，每天醒來都像換了一個版本的日本。</p>
          <img src="../assets/articles/hokuriku/hero.jpg" alt="日本北陸十日遊 代表照片" />
        </header>

        <section class="post-copy">
          <p class="section-kicker">穿過雪牆</p>
          <p>雪牆真的滿震撼的。站在中間會覺得人很小，而且會突然很具體地感覺到，原來季節可以留下這麼高的痕跡。</p>
        </section>
        <section class="post-copy">
          <p class="section-kicker">山城和老街</p>
          <p>後面幾天比較喜歡的是那些慢慢走的地方。木造房子、庭園、橋、路邊小店，不一定是最有名的景點，但很適合留在照片裡。</p>
        </section>
