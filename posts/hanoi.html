          <h1>河內</h1>
          <p>河內和下龍灣像是同一趟旅行裡的兩種聲音。一邊是城市裡的車聲和咖啡，一邊是霧裡慢慢移動的船。</p>
          <img src="../assets/articles/hanoi/hero.jpg" alt="河內 代表照片" />
        </header>

        <section class="post-copy">
          <p class="section-kicker">霧裡的下龍灣</p>
          <p>下龍灣那天霧很重，照片看起來有點像退色的明信片。船開得很慢，山也像是慢慢浮出來，滿適合發呆。</p>
        </section>
        <section class="post-copy">
          <p class="section-kicker">回到老城</p>
          <p>回到河內又是另一種感覺。街道比較滿、聲音比較近，喝咖啡和吃飯的時間變得很重要，像是把旅程重新接回日常。</p>
        </section>
