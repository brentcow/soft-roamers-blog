          <h1>北海道</h1>
          <p>北海道的冬天很漂亮，但不是只有漂亮而已。風很冷、路會滑、走久了會累，可是回看照片的時候，還是會覺得那幾天很值得。</p>
          <img src="../assets/articles/hokkaido/hero.jpg" alt="北海道 代表照片" />
        </header>

        <section class="post-copy">
          <p class="section-kicker">藍色的冬天</p>
          <p>那天在海邊其實滿冷的，但光線很好。雪、海和遠方的山都帶一點藍色，拍起來像是冬天自己把飽和度調低了。</p>
        </section>
        <section class="post-copy">
          <p class="section-kicker">慢下來</p>
          <p>在雪地裡真的很難走快，也剛好讓旅行慢下來。吃熱的東西、找室內休息、走一小段路又停下來拍照，都是這趟很喜歡的部分。</p>
        </section>
